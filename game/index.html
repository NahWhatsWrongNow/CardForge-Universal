<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CardForge Game</title>
  <link rel="stylesheet" href="./game.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>CardForge Runtime</h1>
      <input id="chat-input" placeholder="Type ./DevAbil to unlock dev mode" />
    </header>

    <section id="board">
      <div class="hero enemy" data-target="enemy-hero">Enemy Hero <span id="enemy-health">30</span></div>
      <div id="enemy-minions" class="lane"></div>
      <div id="player-minions" class="lane"></div>
      <div class="hero player" data-target="player-hero">Player Hero <span id="player-health">30</span></div>
      <div id="drop-zone">Drag cards here to play</div>
      <svg id="attack-layer"></svg>
    </section>

    <section id="hand"></section>
    <aside id="log"></aside>
    <div id="toast-host"></div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
