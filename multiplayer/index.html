<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>CardForge Multiplayer</title><style>body{margin:0;background:#0b1020;color:#eef;font-family:system-ui}main{max-width:1100px;margin:0 auto;padding:1rem;display:grid;gap:.8rem}.panel{background:#111a35;border:1px solid #33487a;border-radius:10px;padding:.7rem}button,input,textarea{background:#17254a;color:#fff;border:1px solid #4260a3;border-radius:8px;padding:.5rem}.row{display:flex;gap:.5rem;flex-wrap:wrap}#board{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.hero{padding:.5rem;border-radius:8px;background:#21325f}.hand{display:flex;gap:.4rem;flex-wrap:wrap}.card{padding:.45rem .55rem;border-radius:8px;border:1px solid #5f75ad;background:#2a3d73;cursor:pointer}#log{max-height:200px;overflow:auto;font-size:.9rem}</style></head><body>
<main><h1>Multiplayer 1v1</h1><div class="panel row"><a href="../index.html"><button>Back</button></a><button id="hotseat">Start Local Hotseat</button><button id="host">Host Online (WebRTC)</button><button id="join">Join Online (WebRTC)</button></div>
<div class="panel"><h3>Online Handshake</h3><div class="row"><button id="make-offer">Create Offer</button><button id="apply-offer">Apply Offer</button><button id="make-answer">Create Answer</button><button id="apply-answer">Apply Answer</button></div><textarea id="signal" rows="6" style="width:100%" placeholder="Paste offer/answer JSON here"></textarea></div>
<div id="board" class="panel"><section><div class="hero">Player A HP: <span id="hpA">30</span></div><div class="hand" id="handA"></div></section><section><div class="hero">Player B HP: <span id="hpB">30</span></div><div class="hand" id="handB"></div></section></div><div id="log" class="panel"></div></main>
<script>const state={hpA:30,hpB:30,turn:'A',mode:'none',deckA:[1,2,3,4,5],deckB:[1,2,3,4,5]};let pc,dc;const log=(m)=>{document.getElementById('log').innerHTML=`<div>${m}</div>`+document.getElementById('log').innerHTML;};function render(){hpA.textContent=state.hpA;hpB.textContent=state.hpB;handA.innerHTML='';handB.innerHTML='';state.deckA.forEach((d,i)=>{const b=document.createElement('button');b.className='card';b.textContent=`A Card ${d}`;b.onclick=()=>play('A',i);handA.appendChild(b);});state.deckB.forEach((d,i)=>{const b=document.createElement('button');b.className='card';b.textContent=`B Card ${d}`;b.onclick=()=>play('B',i);handB.appendChild(b);});}
function send(msg){if(dc&&dc.readyState==='open')dc.send(JSON.stringify(msg));}function applyRemote(msg){if(msg.type==='play'){doPlay(msg.side,msg.index,true);}}function play(side,index){if(state.mode==='none')return;doPlay(side,index,false);}function doPlay(side,index,remote){if(state.turn!==side)return;const deck=side==='A'?state.deckA:state.deckB;if(index<0||index>=deck.length)return;deck.splice(index,1);const dmg=Math.floor(Math.random()*4)+1;if(side==='A')state.hpB-=dmg;else state.hpA-=dmg;state.turn=side==='A'?'B':'A';log(`${side} dealt ${dmg} damage`);render();if(!remote)send({type:'play',side,index});}
function setupDataChannel(channel){dc=channel;dc.onmessage=(e)=>applyRemote(JSON.parse(e.data));dc.onopen=()=>log('Online channel connected');}function setupPC(){pc=new RTCPeerConnection();pc.ondatachannel=(e)=>setupDataChannel(e.channel);}hotseat.onclick=()=>{state.mode='local';log('Local hotseat ready');render();};host.onclick=()=>{state.mode='online';setupPC();const channel=pc.createDataChannel('game');setupDataChannel(channel);log('Hosting online session');};join.onclick=()=>{state.mode='online';setupPC();log('Joining online session');};
makeOffer.onclick=async()=>{const offer=await pc.createOffer();await pc.setLocalDescription(offer);signal.value=JSON.stringify(offer);};applyOffer.onclick=async()=>{await pc.setRemoteDescription(JSON.parse(signal.value));log('Offer applied');};makeAnswer.onclick=async()=>{const ans=await pc.createAnswer();await pc.setLocalDescription(ans);signal.value=JSON.stringify(ans);};applyAnswer.onclick=async()=>{await pc.setRemoteDescription(JSON.parse(signal.value));log('Answer applied');};render();</script></body></html>
