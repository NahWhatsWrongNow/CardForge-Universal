<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CardForge Creator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main>
    <h1>Creator Suite</h1>
    <p>Loaded plugins and schema status.</p>
    <section id="plugin-list"></section>
    <section>
      <h2>New Minion Draft</h2>
      <form id="card-form">
        <input name="id" placeholder="id" required />
        <input name="name" placeholder="name" required />
        <input name="cost" type="number" min="0" value="1" />
        <input name="attack" type="number" min="0" value="1" />
        <input name="health" type="number" min="1" value="1" />
        <label><input name="taunt" type="checkbox" /> Taunt</label>
        <button type="submit">Preview JSON</button>
      </form>
      <pre id="preview"></pre>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
